<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔐 Birthday Login</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Comfortaa:wght@400;600;700&family=Righteous&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Comfortaa', cursive;
  min-height: 100vh;
  background: #0d0020;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Stars */
.stars {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 30% 40%, #1e0045 0%, #0d0020 70%);
}
.stars::before, .stars::after {
  content: ''; position: absolute; width: 2px; height: 2px; border-radius: 50%;
  box-shadow:
    60px 90px #fff, 130px 210px #ffd700, 260px 60px #fff, 330px 310px #ff6eb4,
    460px 160px #fff, 560px 410px #fff, 690px 90px #c084fc, 790px 260px #fff,
    910px 360px #ffd700, 1110px 110px #fff, 1210px 460px #ff6eb4,
    80px 460px #fff, 210px 510px #ffd700, 360px 430px #fff, 610px 510px #c084fc,
    760px 490px #fff, 960px 530px #ffd700, 1060px 410px #fff;
  animation: twinkle 3s infinite alternate;
}
.stars::after {
  box-shadow:
    40px 160px #fff, 160px 310px #ffd700, 290px 190px #ff6eb4, 410px 90px #fff,
    530px 290px #c084fc, 650px 360px #fff, 830px 160px #ffd700, 1010px 290px #fff,
    1160px 360px #ff6eb4, 1260px 90px #fff, 110px 380px #fff, 310px 610px #c084fc;
  animation-delay: 1.5s;
}
@keyframes twinkle { from{opacity:0.3;} to{opacity:1;} }

/* Floating hearts */
.hearts-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.h-heart { position: absolute; bottom: -50px; animation: riseHeart linear infinite; opacity: 0.12; }
@keyframes riseHeart {
  0%  { transform: translateY(0) rotate(0deg); opacity: 0.12; }
  100%{ transform: translateY(-110vh) rotate(360deg); opacity: 0; }
}

/* CARD */
.login-wrap {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  width: 100%; padding: 20px;
}

.lock-anim {
  font-size: 90px;
  animation: floatLock 3s ease-in-out infinite;
  margin-bottom: 18px;
  filter: drop-shadow(0 0 20px rgba(255,110,180,0.6));
}
@keyframes floatLock {
  0%,100%{ transform: translateY(0) rotate(-3deg); }
  50%    { transform: translateY(-14px) rotate(3deg); }
}

.login-title {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(2.8rem, 8vw, 5rem);
  background: linear-gradient(135deg, #ff6eb4, #ffd700, #c084fc);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-align: center; margin-bottom: 6px;
  filter: drop-shadow(0 0 12px rgba(255,215,0,0.3));
}

.login-sub {
  font-family: 'Comfortaa', cursive;
  color: #c084fc; font-size: 0.95rem;
  margin-bottom: 38px; text-align: center; letter-spacing: 1px;
}

.card {
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,110,180,0.35);
  border-radius: 28px;
  padding: 44px 48px;
  width: min(440px, 93vw);
  text-align: center;
  backdrop-filter: blur(14px);
  box-shadow: 0 0 80px rgba(192,132,252,0.15), 0 0 30px rgba(255,110,180,0.1);
}

.input-label {
  font-family: 'Righteous', cursive;
  font-size: 0.85rem; letter-spacing: 2px;
  color: #c084fc; margin-bottom: 10px;
  text-align: left; display: block;
}

.pwd-input {
  width: 100%;
  padding: 16px 22px;
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(192,132,252,0.35);
  border-radius: 16px;
  color: #fff;
  font-family: 'Comfortaa', cursive;
  font-size: 1.1rem; text-align: center;
  outline: none; letter-spacing: 4px;
  transition: border-color 0.3s, box-shadow 0.3s;
  margin-bottom: 20px;
}
.pwd-input:focus {
  border-color: #ff6eb4;
  box-shadow: 0 0 24px rgba(255,110,180,0.35);
}
.pwd-input::placeholder { letter-spacing: 1px; color: #7040a0; font-size: 0.95rem; }

.login-btn {
  width: 100%; padding: 17px;
  background: linear-gradient(135deg, #ff6eb4, #c084fc);
  border: none; border-radius: 16px;
  color: #fff;
  font-family: 'Righteous', cursive;
  font-size: 1.15rem; letter-spacing: 2px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 30px rgba(255,110,180,0.35);
}
.login-btn:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(255,110,180,0.55); }
.login-btn:active { transform: translateY(0); }

.error-msg {
  font-family: 'Comfortaa', cursive;
  color: #ff6060; font-size: 0.88rem;
  margin-top: 14px; display: none;
}
@keyframes shake {
  0%,100%{transform:translateX(0);} 25%{transform:translateX(-9px);} 75%{transform:translateX(9px);}
}

.hint { color: #7040a0; font-size: 0.78rem; margin-top: 14px; }
.hint span { color: #c084fc; }

/* particle */
.particle {
  position: fixed; pointer-events: none; z-index: 999;
  animation: float-up 3s ease-in forwards;
}
@keyframes float-up {
  0%  { opacity:1; transform:translateY(0) rotate(0deg); }
  100%{ opacity:0; transform:translateY(-100vh) rotate(720deg); }
}
</style>
</head>
<body>
<div class="stars"></div>
<div class="hearts-bg" id="heartsBg"></div>

<div class="login-wrap">
  <div class="lock-anim">🔐</div>
  <div class="login-title">Secret Birthday Surprise!</div>
  <div class="login-sub">✨ Enter the magic password to unlock ✨</div>

  <div class="card">
    <label class="input-label">PASSWORD</label>
    <input class="pwd-input" id="pwdInput" type="password"
           placeholder="Enter password here..."
           onkeydown="if(event.key==='Enter') checkPwd()">
    <button class="login-btn" onclick="checkPwd()">🎉 &nbsp; Unlock Surprise!</button>
    <div class="error-msg" id="errMsg">❌ Wrong password! &nbsp; Hint: two words 😉</div>
    <div class="hint">Hint: <span>sidu moonji</span></div>
  </div>
</div>

<script>
// Floating hearts
(function(){
  const bg = document.getElementById('heartsBg');
  const h = ['💕','💖','✨','🌟','🌸','💫','🎀','💝'];
  for(let i=0;i<22;i++){
    const el = document.createElement('div');
    el.className = 'h-heart';
    el.textContent = h[Math.floor(Math.random()*h.length)];
    el.style.left = Math.random()*100+'vw';
    el.style.fontSize = (0.9+Math.random()*1.4)+'rem';
    el.style.animationDuration = (6+Math.random()*10)+'s';
    el.style.animationDelay = (Math.random()*12)+'s';
    bg.appendChild(el);
  }
})();

function checkPwd(){
  const val = document.getElementById('pwdInput').value.trim().toLowerCase();
  const err = document.getElementById('errMsg');
  if(val==='sidu moonji'||val==='sidumoonji'){
    spawnParticles(18);
    setTimeout(()=>{ window.location.href='home.html'; }, 600);
  } else {
    err.style.display='block';
    err.style.animation='none'; void err.offsetWidth;
    err.style.animation='shake 0.4s';
    document.getElementById('pwdInput').value='';
  }
}

function spawnParticles(n=15){
  const em=['🎉','🎊','✨','💖','🌟','🎈','💕','🌸','🎀','💫'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const p=document.createElement('div');
      p.className='particle';
      p.textContent=em[Math.floor(Math.random()*em.length)];
      p.style.left=(Math.random()*90+5)+'vw';
      p.style.top=(Math.random()*60+20)+'vh';
      p.style.fontSize=(1+Math.random()*1.5)+'rem';
      p.style.animationDuration=(2+Math.random()*2)+'s';
      document.body.appendChild(p);
      setTimeout(()=>p.remove(),4000);
    },i*70);
  }
}
</script>
</body>
</html>
